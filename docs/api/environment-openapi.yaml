components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    POStatus:
      type: string
      enum:
      - draft
      - submitted
      - partial
      - received
      - closed
      title: POStatus
    ProcurementGroupBy:
      type: string
      enum:
      - warehouse
      - supplier
      - warehouse_supplier
      title: ProcurementGroupBy
    TopologyLocationType:
      type: string
      enum:
      - shelf
      - bin
      - pallet_pos
      - dock
      - virtual
      title: TopologyLocationType
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError

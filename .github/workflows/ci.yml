#GitHub Actions workflow

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-packages --all-groups --all-extras --locked --group dev

      - name: Generate OpenAPI spec
        run: uv run python scripts/ci/generate_openapi.py

      - name: Fetch base OpenAPI spec
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          # Extract the file. If it doesn't exist (e.g., brand new API), create a valid empty spec.
          if ! git show FETCH_HEAD:docs/api/environment-openapi.yaml > base-openapi.yaml 2>/dev/null; then
          printf "openapi: 3.0.0\ninfo:\n  title: Base API\n  version: 1.0.0\npaths: {}\n" > base-openapi.yaml
          fi

      - name: Check for breaking API changes
        if: github.event_name == 'pull_request'
        uses: oasdiff/oasdiff-action/breaking@main
        with:
          base: 'base-openapi.yaml'
          revision: 'docs/api/environment-openapi.yaml'
          fail-on: ERR

      - name: Run pre-commit (lint/format/typecheck)
        id: precommit
        continue-on-error: true
        run: uv run pre-commit run --all-files

      - name: Commit fixes
        if: steps.precommit.outcome == 'failure'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: apply pre-commit auto-fixes"

      - name: Rerun pre-commit
        if: steps.precommit.outcome == 'failure'
        run: uv run pre-commit run --all-files

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov --cov-report=xml:coverage.xml --cov-report=term-missing \
            --junitxml=pytest.xml

      - name: Post Coverage Comment
        if: always() && hashFiles('coverage.xml') != ''
        uses: orgoro/coverage@v3.2
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.8

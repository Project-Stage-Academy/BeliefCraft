openapi: 3.1.0
info:
  title: FastAPI
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Health Get
  /api/v1/smart-query/procurement/suppliers:
    get:
      tags:
      - smart-query
      - smart-query
      summary: Procurement List Suppliers
      operationId: procurement_list_suppliers_api_v1_smart_query_procurement_suppliers_get
      parameters:
      - name: region
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Region
      - name: reliability_min
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Reliability Min
      - name: reliability_max
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Reliability Max
      - name: name_like
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Name Like
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Procurement List Suppliers Api V1 Smart Query Procurement
                  Suppliers Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/smart-query/procurement/suppliers/{supplier_id}:
    get:
      tags:
      - smart-query
      - smart-query
      summary: Procurement Get Supplier
      operationId: procurement_get_supplier_api_v1_smart_query_procurement_suppliers__supplier_id__get
      parameters:
      - name: supplier_id
        in: path
        required: true
        schema:
          type: string
          title: Supplier Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Procurement Get Supplier Api V1 Smart Query Procurement
                  Suppliers  Supplier Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/smart-query/procurement/purchase-orders:
    get:
      tags:
      - smart-query
      - smart-query
      summary: Procurement List Purchase Orders
      operationId: procurement_list_purchase_orders_api_v1_smart_query_procurement_purchase_orders_get
      parameters:
      - name: supplier_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Supplier Id
      - name: destination_warehouse_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Destination Warehouse Id
      - name: status_in
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/POStatus'
          - type: 'null'
          title: Status In
      - name: created_after
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Created After
      - name: created_before
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Created Before
      - name: expected_after
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expected After
      - name: expected_before
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expected Before
      - name: include_names
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Names
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Procurement List Purchase Orders Api V1 Smart Query
                  Procurement Purchase Orders Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/smart-query/procurement/purchase-orders/{purchase_order_id}:
    get:
      tags:
      - smart-query
      - smart-query
      summary: Procurement Get Purchase Order
      operationId: procurement_get_purchase_order_api_v1_smart_query_procurement_purchase_orders__purchase_order_id__get
      parameters:
      - name: purchase_order_id
        in: path
        required: true
        schema:
          type: string
          title: Purchase Order Id
      - name: include_names
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Names
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Procurement Get Purchase Order Api V1 Smart Query
                  Procurement Purchase Orders  Purchase Order Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/smart-query/procurement/po-lines:
    get:
      tags:
      - smart-query
      - smart-query
      summary: Procurement List Po Lines
      operationId: procurement_list_po_lines_api_v1_smart_query_procurement_po_lines_get
      parameters:
      - name: purchase_order_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Purchase Order Id
      - name: purchase_order_ids
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          title: Purchase Order Ids
      - name: product_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Product Id
      - name: include_product_fields
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Product Fields
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Procurement List Po Lines Api V1 Smart Query Procurement
                  Po Lines Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/smart-query/procurement/pipeline-summary:
    get:
      tags:
      - smart-query
      - smart-query
      summary: Procurement Pipeline Summary
      operationId: procurement_pipeline_summary_api_v1_smart_query_procurement_pipeline_summary_get
      parameters:
      - name: destination_warehouse_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Destination Warehouse Id
      - name: supplier_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Supplier Id
      - name: status_in
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              $ref: '#/components/schemas/POStatus'
          - type: 'null'
          title: Status In
      - name: horizon_days
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            maximum: 365
            minimum: 1
          - type: 'null'
          title: Horizon Days
      - name: group_by
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ProcurementGroupBy'
          default: warehouse_supplier
      - name: include_names
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Names
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Procurement Pipeline Summary Api V1 Smart Query Procurement
                  Pipeline Summary Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    POStatus:
      type: string
      enum:
      - draft
      - submitted
      - partial
      - received
      - closed
      title: POStatus
    ProcurementGroupBy:
      type: string
      enum:
      - warehouse
      - supplier
      - warehouse_supplier
      title: ProcurementGroupBy
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
